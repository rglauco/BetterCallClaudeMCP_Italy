name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --workspaces

      - name: Build packages
        run: npm run build --workspaces

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit --project tsconfig.json

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f mcp-servers-http/Dockerfile -t bettercallclaude-italy:test .
      - name: Test Docker healthcheck
        run: |
          docker run -d --name test-mcp -p 8080:8080 bettercallclaude-italy:test
          sleep 8
          curl -sf http://localhost:8080/health || (docker logs test-mcp && exit 1)
          docker stop test-mcp
